name: TypeScript CI/CD

on:
    pull_request:
        branches: [master]
        paths:
            - "**/*.ts"
    release:
        types: [published]

jobs:

    publish:
        name: Build and Publish to npm
        runs-on: ubuntu-latest
        if: github.event_name == 'release'

        permissions:
            contents: read
            id-token: write

        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"

            - name: Install dependencies
              run: npm ci

            - name: Set package version from release tag
              env:
                  RELEASE_TAG: ${{ github.event.release.tag_name }}
              run: |
                  VERSION="${RELEASE_TAG#v}"
                  if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
                      echo "Release tag '$RELEASE_TAG' does not contain a valid npm version"
                      exit 1
                  fi
                  CURRENT_VERSION="$(node -p "require('./package.json').version")"
                  echo "Release tag version: $VERSION"
                  echo "Current package.json version: $CURRENT_VERSION"

                  if [[ "$CURRENT_VERSION" == "$VERSION" ]]; then
                      echo "package.json already matches release tag; skipping npm version"
                  else
                      npm version "$VERSION" --no-git-tag-version
                  fi

            - name: Build package
              run: npm run build

            - name: Publish to npm
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: npm publish --provenance --access public
